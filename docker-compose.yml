services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: archi-website:prod
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-http://localhost:8000}
      LOG_CHANNEL: ${LOG_CHANNEL:-stack}
      DB_CONNECTION: ${DB_CONNECTION:-mysql}
      DB_HOST: ${DB_HOST:-localhost}
      DB_PORT: ${DB_PORT:-3306}
      DB_DATABASE: ${DB_DATABASE:-archi_website}
      DB_USERNAME: ${DB_USERNAME:-app}
      DB_PASSWORD: ${DB_PASSWORD:-app}
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - app-network

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    image: archi-website-web:prod
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - '${APP_PORT:-8000}:80'
    networks:
      - app-network

  mariadb:
    image: mariadb:11.8
    restart: unless-stopped
    container_name: mariadb
    environment:
      MARIADB_ALLOW_EMPTY_ROOT_PASSWORD: ${MARIADB_ALLOW_EMPTY_ROOT_PASSWORD:-no}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-root}
      MARIADB_ROOT_HOST: ${MARIADB_ROOT_HOST:-%}
      MARIADB_DATABASE: ${DB_DATABASE:-archi_website}
      MARIADB_USER: ${DB_USERNAME:-app}
      MARIADB_PASSWORD: ${DB_PASSWORD:-app}
    ports:
      - '${DB_PORT:-3306}:3306'
    volumes:
      - mariadb-data:/var/lib/mysql
      - ./docker/mariadb/healthcheck.sh:/healthcheck.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "sh /healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mariadb-data:
