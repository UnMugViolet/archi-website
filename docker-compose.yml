services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: archi-website:prod
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-http://localhost}
      LOG_CHANNEL: ${LOG_CHANNEL:-stack}
      DB_CONNECTION: mysql
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-laravel}
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD:-}
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - app-network

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    image: archi-website-web:prod
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - '${APP_PORT:-80}:80'
    networks:
      - app-network

  mariadb:
    image: mariadb:11.8
    restart: unless-stopped
    container_name: mariadb
    environment:
      MARIADB_ALLOW_EMPTY_ROOT_PASSWORD: ${MARIADB_ALLOW_EMPTY_ROOT_PASSWORD:-yes}
      MARIADB_ROOT_PASSWORD: ${DB_PASSWORD:-}
      MARIADB_ROOT_HOST: ${MARIADB_ROOT_HOST:-%}
      MARIADB_DATABASE: ${DB_DATABASE}
      MARIADB_USER: ${DB_USERNAME}
      MARIADB_PASSWORD: ${DB_PASSWORD}
    ports:
      - '${MARIADB_PORT:-3306}:3306'
    volumes:
      - mariadb-data:/var/lib/mysql
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          if [ -n "$${MARIADB_ROOT_PASSWORD}" ]; then
            mariadb-admin ping -h 127.0.0.1 -uroot -p"$${MARIADB_ROOT_PASSWORD}" --silent;
          else
            mariadb-admin ping -h 127.0.0.1 -uroot --silent;
          fi
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mariadb-data:
