services:
  app:
    image: unmugviolet/archi-website-app:latest
    container_name: archi-website
    env_file:
      - .env
    environment:
      - HTTPS=on
      - SERVER_HTTPS=on
      - FORCE_HTTPS=true
      - SESSION_SECURE_COOKIE=true
      - DB_CONNECTION=mysql
      - DB_HOST=mariadb
      - DB_PORT=3306
    volumes:
      - ./storage:/var/www/html/storage
    networks:
      - archi-website_network
    depends_on:
      mariadb:
        condition: service_healthy
    restart: unless-stopped

  web:
    image: unmugviolet/archi-website-web:latest
    container_name: archi-website_web
    ports:
      - "35005:80"
    volumes:
      - ./storage:/var/www/html/storage
    networks:
      - archi-website_network
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

  mariadb:
    image: mariadb:11.8
    container_name: archi-website_db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - archi-website_network
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          if [ -n "$${MYSQL_ROOT_PASSWORD}" ]; then
            mariadb-admin ping -h 127.0.0.1 -uroot -p"$${MYSQL_ROOT_PASSWORD}" --silent;
          else
            mariadb-admin ping -h 127.0.0.1 -uroot --silent;
          fi
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

volumes:
  db_data:
    driver: local
    driver_opts:
      type: none
      device: /home/unmugviolet/databases/archi-website
      o: bind

networks:
  archi-website_network:
    driver: bridge
